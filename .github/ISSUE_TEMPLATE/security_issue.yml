name: "Security Issue"
description: Report a vulnerability
title: "[SECURITY] "
labels: ["security", "critical"]
body:
  - type: markdown
    attributes:
      value: "**Sensitive information — email security@nerionsoft.com instead**"
  - type: textarea
    id: description
    attributes:
      label: Vulnerability description
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Potential impact
      options:
        - label: Data exposure
        - label: Privilege escalation
        - label: RCE / Injection
        - label: Authentication bypass
  - type: textarea
    id: steps
    attributes:
      label: Reproduction / Recommendation
    validations:
      required: false
