name: "Bug Report"
description: Report a bug or malfunction
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the bug and steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Logs / Screenshots / Environment
    validations:
      required: false
