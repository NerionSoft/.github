name: "🐞 Bug Report"
description: Signaler un dysfonctionnement
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Décris le bug et les étapes pour reproduire
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Logs / Screenshots / Environnement
    validations:
      required: false
